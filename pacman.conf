# /etc/pacman.conf
# AcreetionOS Sway — Package manager configuration
# Uses acreetionos-main, personal, and acur repos exclusively.
# Standard Arch Linux repositories are NOT used.

[options]
IgnorePkg = v4l2loopback-dkms
NoUpgrade = pacman
OverwriteFiles = *
Architecture = auto
Overwrite    = *
Color
CheckSpace
ParallelDownloads = 25
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

# ── AcreetionOS Repositories ────────────────────────────────────
# acreetionos-main   → LTS-stable curated packages
# personal           → Additional tools & utilities
# acur              → AcreetionOS Community User Repository (AUR-compatible)

[acreetionos-main]
SigLevel = Optional
Server = https://iso.acreetionos.org:8448/repo-main/$arch

[personal]
SigLevel = Optional
Server = https://iso.acreetionos.org:8448/personal

[acur]
SigLevel = Optional
Server = https://iso.acreetionos.org:8448/acur
